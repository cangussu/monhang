name = "top-app"
version = "1.0.3"
repo = "monhang.git"

[repoconfig]
type = "git"
base = "git@github.com:monhang/"

[build]
type = "shell"

[[deps.build]]
name = "lib1"
version = "v1.0.0"
repo = "example.git"

[[deps.build]]
name = "lib2"
version = "v2.0.2"
repo = "example.git"

[[components]]
source = "git+https://github.com/example/component1@v1.0.0"
name = "component1"
description = "Example component from GitHub"

[[components]]
source = "https://github.com/example/component2.git@v2.1.0"
name = "component2"
description = "Another example component"
